<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOZhi — 命令面板风导航</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fafafa;
            color: #0f0f0f;
            min-height: 200vh;
        }

        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid #eee;
        }

        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 28px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 16px;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .logo-mark {
            width: 28px; height: 28px;
            background: #111;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 12px; font-weight: 800;
        }

        .logo-name {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .breadcrumb-sep {
            color: #ddd;
            font-size: 18px;
            font-weight: 300;
            margin: 0 2px;
        }

        .breadcrumb-current {
            font-size: 13px;
            color: #888;
            font-weight: 500;
        }

        /* 命令搜索栏 —— 视觉中心 */
        .command-bar {
            flex: 1;
            max-width: 480px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 8px 14px;
            cursor: pointer;
            transition: all 0.25s;
        }

        .command-bar:hover {
            border-color: #ddd;
            background: #f0f0f0;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.02);
        }

        .command-bar svg { width: 15px; height: 15px; color: #999; flex-shrink: 0; }

        .command-bar-text {
            font-size: 13px;
            color: #aaa;
            flex: 1;
        }

        .command-bar-keys {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }

        .command-bar-keys kbd {
            font-size: 10px;
            font-family: inherit;
            font-weight: 600;
            background: #e8e8e8;
            color: #777;
            border-radius: 4px;
            padding: 2px 6px;
            border: none;
            line-height: 1.3;
        }

        /* 右侧导航链接 + 操作 */
        .nav-right {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-left: auto;
        }

        .nav-link {
            font-size: 13px;
            font-weight: 500;
            color: #777;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .nav-link:hover { color: #1a1a1a; background: rgba(0,0,0,0.03); }
        .nav-link.active { color: #1a1a1a; font-weight: 600; }

        .nav-divider {
            width: 1px; height: 18px;
            background: #eee;
            margin: 0 8px;
        }

        .avatar {
            width: 30px; height: 30px;
            border-radius: 999px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 12px; font-weight: 700;
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px #e5e5e5;
            transition: box-shadow 0.2s;
        }

        .avatar:hover {
            box-shadow: 0 0 0 2px #6366f1;
        }

        .btn-compact {
            font-size: 12.5px;
            font-weight: 600;
            color: #fff;
            background: #111;
            border: none;
            border-radius: 8px;
            padding: 7px 16px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-compact:hover { background: #333; }

        .icon-btn {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: none; background: transparent;
            border-radius: 8px; color: #888; cursor: pointer;
            transition: all 0.15s;
        }

        .icon-btn:hover { background: rgba(0,0,0,0.04); color: #1a1a1a; }
        .icon-btn svg { width: 16px; height: 16px; }

        /* 快捷键 tooltip */
        .nav-link[data-shortcut]::after {
            content: attr(data-shortcut);
            font-size: 9px;
            color: #bbb;
            margin-left: 4px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .nav-link[data-shortcut]:hover::after {
            opacity: 1;
        }

        .page-content {
            max-width: 800px; margin: 0 auto; padding: 64px 24px;
        }
        .page-content h1 {
            font-size: 36px; font-weight: 800;
            letter-spacing: -0.03em; line-height: 1.25; margin-bottom: 12px;
        }
        .page-content p { color: #666; font-size: 15px; line-height: 1.7; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="navbar-inner">
        <div class="nav-left">
            <div class="logo-mark">M</div>
            <span class="logo-name">MOZhi</span>
            <span class="breadcrumb-sep">/</span>
            <span class="breadcrumb-current">Commerce</span>
        </div>

        <div class="command-bar" id="commandBar">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <span class="command-bar-text">搜索内容、创作者、商品...</span>
            <div class="command-bar-keys">
                <kbd>⌘</kbd><kbd>K</kbd>
            </div>
        </div>

        <div class="nav-right">
            <a href="#" class="nav-link" data-shortcut="G D">发现</a>
            <a href="#" class="nav-link active">商城</a>
            <a href="#" class="nav-link" data-shortcut="G C">创作</a>
            <div class="nav-divider"></div>
            <button class="icon-btn" title="通知">
                <svg fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
            </button>
            <button class="btn-compact">注册</button>
            <div class="avatar">U</div>
        </div>
    </div>
</nav>

<div class="page-content">
    <h1>让交易也保留内容平台的秩序感</h1>
    <p>商城与拼团不是额外独立出去的专区，而是会沿用 MOZhi 这套 editorial 风格。</p>
</div>
</body>
</html>
