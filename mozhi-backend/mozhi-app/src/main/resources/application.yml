spring:
  application:
    name: mozhi-app
  profiles:
    active: dev
  flyway:
    enabled: true
    locations: classpath:db/migration/platform

server:
  port: 8090

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath:mybatis/mapper/*.xml

mozhi:
  auth:
    cookie-secure: ${MOZHI_AUTH_COOKIE_SECURE:false}
    challenge:
      provider: ${MOZHI_AUTH_CHALLENGE_PROVIDER:noop}
      noop-pass-token: ${MOZHI_AUTH_CHALLENGE_NOOP_PASS_TOKEN:dev-pass}
    limits:
      login-ip-max-attempts: ${MOZHI_AUTH_LOGIN_IP_MAX_ATTEMPTS:20}
      login-ip-window-minutes: ${MOZHI_AUTH_LOGIN_IP_WINDOW_MINUTES:10}
      login-identifier-challenge-threshold: ${MOZHI_AUTH_LOGIN_IDENTIFIER_CHALLENGE_THRESHOLD:5}
      login-identifier-lock-threshold: ${MOZHI_AUTH_LOGIN_IDENTIFIER_LOCK_THRESHOLD:10}
      login-identifier-window-minutes: ${MOZHI_AUTH_LOGIN_IDENTIFIER_WINDOW_MINUTES:15}
      login-identifier-lock-minutes: ${MOZHI_AUTH_LOGIN_IDENTIFIER_LOCK_MINUTES:15}
      register-ip-max-attempts: ${MOZHI_AUTH_REGISTER_IP_MAX_ATTEMPTS:5}
      register-ip-challenge-threshold: ${MOZHI_AUTH_REGISTER_IP_CHALLENGE_THRESHOLD:3}
      register-ip-window-minutes: ${MOZHI_AUTH_REGISTER_IP_WINDOW_MINUTES:60}
      register-email-max-attempts: ${MOZHI_AUTH_REGISTER_EMAIL_MAX_ATTEMPTS:3}
      register-email-window-hours: ${MOZHI_AUTH_REGISTER_EMAIL_WINDOW_HOURS:24}
      register-username-max-attempts: ${MOZHI_AUTH_REGISTER_USERNAME_MAX_ATTEMPTS:5}
      register-username-window-hours: ${MOZHI_AUTH_REGISTER_USERNAME_WINDOW_HOURS:24}
  web:
    allowed-origins:
      - http://127.0.0.1:5173
      - http://localhost:5173
  storage:
    minio:
      enabled: ${MOZHI_STORAGE_MINIO_ENABLED:false}
      endpoint: ${MOZHI_STORAGE_MINIO_ENDPOINT:http://127.0.0.1:19000}
      public-endpoint: ${MOZHI_STORAGE_MINIO_PUBLIC_ENDPOINT:http://127.0.0.1:19000}
      bucket: ${MOZHI_STORAGE_MINIO_BUCKET:mozhi-assets}
      access-key: ${MOZHI_STORAGE_MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MOZHI_STORAGE_MINIO_SECRET_KEY:minioadmin}
