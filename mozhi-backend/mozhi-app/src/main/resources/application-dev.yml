spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:13306}/${MYSQL_DATABASE:mozhi}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:19092}

mozhi:
  auth:
    cookie-secure: ${MOZHI_AUTH_COOKIE_SECURE:false}
    challenge:
      provider: ${MOZHI_AUTH_CHALLENGE_PROVIDER:turnstile}
      allow-bypass-when-unconfigured: ${MOZHI_AUTH_CHALLENGE_ALLOW_BYPASS_WHEN_UNCONFIGURED:true}
      turnstile:
        allowed-hostnames: ${MOZHI_AUTH_TURNSTILE_ALLOWED_HOSTNAMES:localhost,127.0.0.1}
